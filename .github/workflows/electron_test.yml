name: Electron Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  checks: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/explorama/images/build-image:latest
    defaults:
      run:
        working-directory: ./bundles/electron
    steps:
      - uses: actions/checkout@v6
      - run: apk add --no-cache tar
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: "m2-electron-${{ hashFiles('bundles/electron/backend/deps.edn') }}-${{ hashFiles('bundles/electron/frontend/deps.edn') }}-${{ hashFiles('bundles/electron/backend/package-lock.json') }}-${{ hashFiles('bundles/electron/frontend/package-lock.json') }}"
      - name: Run backend tests
        run: |
          cd backend
          npm install
          bb run-tests-ci.bb.clj
      - name: Run frontend tests
        run: |
          cd frontend
          npm install
          mv figwheel-headless-ci.sh.template figwheel-headless.sh
          bb run-tests-ci.bb.clj
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: success() || failure()
        with:
          report_paths: "**/*report.xml"
